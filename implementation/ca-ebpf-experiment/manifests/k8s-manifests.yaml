            port: 5003
          initialDelaySeconds: 5
          periodSeconds: 10
---
# ---- Services (ClusterIP) ----
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: production
spec:
  selector:
    app: order-service
  ports:
  - port: 5000
    targetPort: 5000
    protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: production
spec:
  selector:
    app: payment-service
  ports:
  - port: 5001
    targetPort: 5001
    protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: user-profile-service
  namespace: production
spec:
  selector:
    app: user-profile-service
  ports:
  - port: 5002
    targetPort: 5002
    protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: admin-service
  namespace: production
spec:
  selector:
    app: admin-service
  ports:
  - port: 5003
    targetPort: 5003
    protocol: TCP
  type: ClusterIP
